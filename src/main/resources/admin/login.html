<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS3-DNS Cluster &ndash; Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-card h1 { color: #e94560; font-size: 1.4rem; font-weight: 700; }
        .login-card .subtitle { color: rgba(255,255,255,0.5); font-size: 0.85rem; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #e94560;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.25);
        }
        .form-label { color: rgba(255,255,255,0.7); }
        .btn-login {
            background: linear-gradient(135deg, #e94560, #c0392b);
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { background: linear-gradient(135deg, #c0392b, #a93226); }
        .logo-icon { font-size: 2.5rem; }
        #errorAlert { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-icon">&#x1F4E1;</div>
            <h1 class="mt-2">TS3-DNS Cluster</h1>
            <p class="subtitle">Admin Control Panel</p>
        </div>

        <div id="errorAlert" class="alert alert-danger alert-sm py-2" role="alert">
            Invalid username or password.
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username"
                       autocomplete="username" required autofocus>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-login btn-primary w-100" id="loginBtn">
                Sign in
            </button>
        </form>

        <p class="text-center mt-4 mb-0" style="color:rgba(255,255,255,0.3); font-size:0.75rem;">
            TS3-DNS Cluster 1.0 Beta &bull; Hammermaps.de
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('errorAlert');
            btn.disabled = true;
            btn.textContent = 'Signing in…';
            errDiv.style.display = 'none';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/index.html';
                } else {
                    errDiv.textContent = data.error || 'Invalid username or password.';
                    errDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                }
            } catch(err) {
                errDiv.textContent = 'Connection error. Please try again.';
                errDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        });
    </script>
</body>
</html>
