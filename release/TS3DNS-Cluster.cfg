# Settings
default_debug = false
default_master_server = true
default_slave_server = false
default_ip_for_dns = 0.0.0.0
default_port_for_dns = 9987
default_server_port = 41144
default_server_ip = 0.0.0.0
default_machine_id = 0
default_send_messages = 1

# MySQL Database
mysql_host = 10.10.10.3
mysql_user = xxxxxx
mysql_pass = xxxxxx
mysql_db = ts3dns
mysql_port = 3306

# Global Couchbase Cache
couchbase_enable = false
couchbase_host = 10.10.10.5
couchbase_bucket = ts3dns
couchbase_username = xxxxxx
couchbase_password = xxxxxx
couchbase_table = dnscache
couchbase_master_table = macache
couchbase_machine_id = 1

# Master/Master Failover (requires couchbase_enable = true and default_master_server = true)
# Seconds without a heartbeat before a master is considered dead and another takes over.
# Lower values mean faster failover; minimum recommended value is 3.
default_master_failover_timeout = 5

# Admin UI
# Set to true to enable the web-based Admin UI
admin_ui_enabled = true
# Port the Admin UI HTTP server listens on
admin_ui_port = 8080
# IP address to bind the Admin UI HTTP server to (0.0.0.0 = all interfaces)
admin_ui_bind = 0.0.0.0
# Login credentials for the Admin UI  (change these before deploying!)
admin_ui_username = admin
admin_ui_password = changeme

# Anti-Flood Protection
# Set to true to enable per-IP rate limiting and IP banning on the DNS port
flood_protection_enabled = true
# Maximum number of requests allowed per IP within the time window
flood_max_requests = 10
# Length of the rate-limit window in seconds
flood_window_seconds = 1
# After how many blocked requests an IP is auto-banned (0 = never auto-ban)
flood_auto_ban_threshold = 100
# Duration of an auto-ban in seconds (0 = permanent)
flood_auto_ban_duration = 3600
